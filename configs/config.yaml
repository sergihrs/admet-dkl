# Root Hydra config.
# Training and tuning are the same action:
#   - Single run:   python main.py [overrides...]
#   - Optuna sweep: python main.py -m [overrides...]
#
# Override examples:
#   python main.py dataset=hia_hou model=sv_dkl train.lr=5e-4
#   python main.py -m model=sv_dkl                              # 30-trial sweep
#   python main.py -m model=sv_dkl hydra.sweeper.n_trials=50

defaults:
  - model: mlp
  - train: default
  - data: default
  - override hydra/sweeper: optuna         # only active with -m
  - override hydra/sweeper/sampler: tpe    # TPE sampler (required field)
  - _self_

dataset: caco2_wang   # string key; override with dataset=hia_hou etc.
mode: train           # train | embed
seed: 42
device: cuda          # cuda | cpu

# Single-run output dir.  Sweep jobs use hydra.sweep.dir / subdir below.
output_dir: outputs/${dataset}/${model.type}/runs/${now:%Y-%m-%d_%H-%M-%S}

hydra:
  run:
    dir: ${output_dir}
  sweep:
    dir: outputs/${dataset}/${model.type}/sweeps/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}   # 0, 1, 2, … per trial
  job:
    chdir: false   # keep cwd at project root so relative paths work

  # ---------------------------------------------------------------------------
  # Optuna sweeper — only executes in -m (multirun) mode.
  # Shared search space for both MLP and SV-DKL.
  # DKL-specific params (n_inducing, gp_lr) are appended in configs/model/sv_dkl.yaml.
  # hidden_dims uses compact string tokens to keep Optuna categorical choices
  # primitive (avoids ListConfig warnings in persistent-trial storage).
  # ---------------------------------------------------------------------------
  sweeper:
    direction: minimize      # regression: val MAE; classification: 1-val-ROC-AUC
    study_name: null         # auto-generated; override: hydra.sweeper.study_name=X
    n_trials: 30
    n_jobs: 1
    search_space:
      train.lr:
        type: float
        low: 1e-5
        high: 1e-2
        log: true
      model.use_batchnorm:
        type: categorical
        choices: [true, false]
      model.dropout_rate:
        type: float
        low: 0.01
        high: 0.5
      model.use_residual:
        type: categorical
        choices: [true, false]
      model.hidden_dims:
        type: categorical
        # choices: [h512_256_128, h512_256, h512, h256, h128_64, h0]
        # create 10 more combinations including some wider layers for better DKL performance
        choices: [h512_256_128, h512_256, h512, h256, h128_64, h0, h1024_512_256, h1024_512, h512_256_256, h256_256, h128_128, h1024, h256_256_128, h128_128_64, h64_64, h64]
